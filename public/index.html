<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>os.ubq.fi — Minimal Deno Server</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>os.ubq.fi</h1>
      <p>Minimal Deno server with a simple UI and API.</p>

      <section>
        <h2>Health</h2>
        <button id="checkHealth">Check Health</button>
        <pre id="healthOut">(click to load)</pre>
      </section>

      <section>
        <h2>Time</h2>
        <button id="getTime">Get Time</button>
        <pre id="timeOut">(click to load)</pre>
      </section>

      <section>
        <h2>Relations</h2>
        <form id="relationsForm" class="inline-form">
          <label>
            Table
            <input id="relationsTable" value="issues" autocomplete="off" />
          </label>
          <label>
            Row ID
            <input id="relationsId" value="iss_0002" autocomplete="off" />
          </label>
          <button type="submit">GET /api/sb/relations</button>
        </form>
        <div id="relationsList" class="relation-list" aria-live="polite"></div>
        <pre id="relationsOut">(submit to inspect)</pre>
      </section>

      <section>
        <h2>Echo</h2>
        <form id="echoForm">
          <label>
            JSON payload
            <textarea id="echoInput" rows="4" placeholder='{"hello":"world"}'></textarea>
          </label>
          <button type="submit">POST /api/echo</button>
        </form>
        <pre id="echoOut">(submit to send)</pre>
      </section>
    </main>

    <script type="module" defer src="/assets/app.js"></script>
  </body>
</html>
