<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>os.ubq.fi — Minimal Deno Server</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>os.ubq.fi</h1>
      <p>Minimal Deno server with a simple UI and API.</p>

      <section>
        <h2>Health</h2>
        <button id="checkHealth">Check Health</button>
        <pre id="healthOut">(click to load)</pre>
      </section>

      <section>
        <h2>Time</h2>
        <button id="getTime">Get Time</button>
        <pre id="timeOut">(click to load)</pre>
      </section>

      <section>
        <h2>Rows</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col" data-sort-column="service">
                  <button class="sort-header" type="button" data-sort-key="service">
                    Service <span class="sort-indicator" data-sort-indicator></span>
                  </button>
                </th>
                <th scope="col" data-sort-column="status">
                  <button class="sort-header" type="button" data-sort-key="status">
                    Status <span class="sort-indicator" data-sort-indicator></span>
                  </button>
                </th>
                <th scope="col" data-sort-column="latencyMS">
                  <button class="sort-header" type="button" data-sort-key="latencyMS">
                    Latency <span class="sort-indicator" data-sort-indicator></span>
                  </button>
                </th>
                <th scope="col" data-sort-column="updatedAt">
                  <button class="sort-header" type="button" data-sort-key="updatedAt">
                    Updated <span class="sort-indicator" data-sort-indicator></span>
                  </button>
                </th>
              </tr>
            </thead>
            <tbody id="rowsBody">
              <tr>
                <td colspan="4">Loading rows...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <p id="rowsStatus" class="sr-only" aria-live="polite"></p>
      </section>

      <section>
        <h2>Echo</h2>
        <form id="echoForm">
          <label>
            JSON payload
            <textarea id="echoInput" rows="4" placeholder='{"hello":"world"}'></textarea>
          </label>
          <button type="submit">POST /api/echo</button>
        </form>
        <pre id="echoOut">(submit to send)</pre>
      </section>
    </main>

    <script type="module" defer src="/assets/app.js"></script>
  </body>
  </html>
