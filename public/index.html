<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>os.ubq.fi — Minimal Deno Server</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="appbar" role="banner">
      <div class="appbar__inner">
        <div class="brand"><span class="logo" aria-hidden="true">◆</span><span class="brand__name">os.ubq.fi Explorer</span></div>
        <nav class="appbar__actions" aria-label="Global actions">
          <button id="themeToggle" class="btn btn--icon" aria-label="Toggle theme" title="Toggle theme">🌙</button>
          <a class="btn btn--ghost" href="#" title="Help">Help</a>
        </nav>
      </div>
    </header>
    <main class="layout" id="mainContent">
	      <aside class="sidebar">
	        <h2>Tables</h2>
	        <div class="input-icon">
	          <span class="icon" aria-hidden="true">🔎</span>
	          <input id="tableSearch" class="input" placeholder="Filter tables..." aria-label="Filter tables" />
	          <button id="clearTableSearch" class="btn btn--icon clear" aria-label="Clear filter" title="Clear">×</button>
	        </div>
	        <ul id="tableList" class="table-list"></ul>

	        <h2>Saved Views</h2>
	        <div class="views-bar">
	          <button id="saveViewBtn" aria-label="Save current view">Save View</button>
	        </div>
	        <ul id="viewList" class="table-list"></ul>
	      </aside>

      <section class="content">
        <header class="content-header">
          <div>
            <h1 id="tableTitle">Data Explorer</h1>
            <div id="tableSubtitle" class="muted">Select a table to begin</div>
            <div id="filterChips" class="chips"></div>
          </div>
          <div class="toolbar">
            <div class="toolbar__group">
              <label>Page size
                <select id="pageSize">
                  <option>25</option>
                  <option selected>50</option>
                  <option>100</option>
                  <option>1000</option>
                  <option>5000</option>
                </select>
              </label>
            </div>
            <div class="toolbar__group">
              <button id="prevPage" class="btn btn--ghost">Prev</button>
              <button id="nextPage" class="btn btn--primary">Next</button>
              <button id="applyFirstViewBtn" class="btn btn--secondary" aria-label="Apply saved view">Apply View</button>
            </div>
            <span class="spacer"></span>
            <div class="toolbar__group">
              <button id="exportCsv" class="btn btn--secondary" title="Download visible rows as CSV">Export CSV</button>
              <button id="exportJson" class="btn btn--secondary" title="Download visible rows as JSON">Export JSON</button>
            </div>
          </div>
        </header>

        <div id="summaryBar" class="summary" aria-live="polite"></div>

        <div class="table-container">
          <table class="table" id="sbGrid" role="grid" aria-label="Data grid" tabindex="0"></table>
        </div>
      </section>

      <aside class="inspector">
        <h2 id="inspectorTitle">Object</h2>
        <div id="objectSummary" class="card muted">(select a row)</div>
        <div class="rel-sections">
          <div class="card">
            <h3>Related</h3>
            <div id="relatedOutbound"></div>
          </div>
          <div class="card">
            <h3>Referenced By</h3>
            <div id="relatedInbound"></div>
          </div>
        </div>

        <details class="details" id="diagnostics">
          <summary>Diagnostics</summary>
          <div class="diag-grid">
            <div>
              <button id="checkHealth">Check Health</button>
              <pre id="healthOut">(click to load)</pre>
            </div>
            <div>
              <button id="getTime">Get Time</button>
              <pre id="timeOut">(click to load)</pre>
            </div>
            <div>
              <form id="echoForm">
                <label>
                  JSON payload
                  <textarea id="echoInput" rows="4" placeholder='{"hello":"world"}'></textarea>
                </label>
                <button type="submit">POST /api/echo</button>
              </form>
              <pre id="echoOut">(submit to send)</pre>
            </div>
          </div>
        </details>
      </aside>
    </main>

    <script type="module" defer src="/assets/app.js"></script>
  </body>
  </html>
