<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>os.ubq.fi — Minimal Deno Server</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>os.ubq.fi</h1>
      <p>Minimal Deno server with a simple UI and API.</p>

      <section aria-labelledby="savedViewsHeading">
        <h2 id="savedViewsHeading">Saved Views</h2>
        <form id="savedViewForm" class="saved-view-form">
          <label>
            View name
            <input
              id="savedViewName"
              type="text"
              maxlength="80"
              autocomplete="off"
              placeholder="Production health"
            />
          </label>
          <button type="submit">Save Current URL</button>
        </form>
        <ul id="savedViewsList" class="saved-view-list" aria-label="Saved views"></ul>
        <p id="savedViewsStatus" class="saved-view-status" aria-live="polite"></p>
      </section>

      <section>
        <h2>Health</h2>
        <button id="checkHealth">Check Health</button>
        <pre id="healthOut">(click to load)</pre>
      </section>

      <section>
        <h2>Time</h2>
        <button id="getTime">Get Time</button>
        <pre id="timeOut">(click to load)</pre>
      </section>

      <section>
        <h2>Echo</h2>
        <form id="echoForm">
          <label>
            JSON payload
            <textarea id="echoInput" rows="4" placeholder='{"hello":"world"}'></textarea>
          </label>
          <button type="submit">POST /api/echo</button>
        </form>
        <pre id="echoOut">(submit to send)</pre>
      </section>
    </main>

    <script type="module" defer src="/assets/app.js"></script>
  </body>
  </html>
