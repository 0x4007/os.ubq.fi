<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>os.ubq.fi — Minimal Deno Server</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>os.ubq.fi</h1>
      <p>Minimal Deno server with a simple UI and API.</p>

      <section>
        <h2>Health</h2>
        <button id="checkHealth">Check Health</button>
        <pre id="healthOut">(click to load)</pre>
      </section>

      <section>
        <h2>Time</h2>
        <button id="getTime">Get Time</button>
        <pre id="timeOut">(click to load)</pre>
      </section>

      <section>
        <h2>View State</h2>
        <form id="viewStateForm" class="state-grid">
          <label>
            Table
            <input id="tableInput" name="table" value="users" />
          </label>
          <label>
            Offset
            <input id="offsetInput" name="offset" inputmode="numeric" value="0" />
          </label>
          <label>
            Limit
            <input id="limitInput" name="limit" inputmode="numeric" value="25" />
          </label>
          <label>
            Sort
            <input id="sortInput" name="sort" value="created" />
          </label>
          <label>
            Desc
            <input id="descInput" name="desc" type="checkbox" />
          </label>
          <label>
            Filters
            <input id="filtersInput" name="filters" placeholder="status:active" />
          </label>
          <label>
            Row ID
            <input id="rowIdInput" name="rowId" />
          </label>
        </form>
        <pre id="viewStateOut"></pre>
      </section>

      <section>
        <h2>Echo</h2>
        <form id="echoForm">
          <label>
            JSON payload
            <textarea id="echoInput" rows="4" placeholder='{"hello":"world"}'></textarea>
          </label>
          <button type="submit">POST /api/echo</button>
        </form>
        <pre id="echoOut">(submit to send)</pre>
      </section>
    </main>

    <script type="module" defer src="/assets/app.js"></script>
  </body>
  </html>
