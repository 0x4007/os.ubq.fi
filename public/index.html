<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>os.ubq.fi — Minimal Deno Server</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to content</a>
    <main id="main-content" tabindex="-1">
      <h1>os.ubq.fi</h1>
      <p>Minimal Deno server with a simple UI and API.</p>

      <section
        class="api-card"
        tabindex="0"
        role="region"
        aria-labelledby="health-heading"
      >
        <h2 id="health-heading">Health</h2>
        <button id="checkHealth" type="button" aria-controls="healthOut">
          Check Health
        </button>
        <pre
          id="healthOut"
          role="status"
          aria-live="polite"
        >(click to load)</pre>
      </section>

      <section
        class="api-card"
        tabindex="0"
        role="region"
        aria-labelledby="time-heading"
      >
        <h2 id="time-heading">Time</h2>
        <button id="getTime" type="button" aria-controls="timeOut">
          Get Time
        </button>
        <pre id="timeOut" role="status" aria-live="polite">(click to load)</pre>
      </section>

      <section
        class="api-card"
        tabindex="0"
        role="region"
        aria-labelledby="echo-heading"
      >
        <h2 id="echo-heading">Echo</h2>
        <form id="echoForm">
          <label>
            JSON payload
            <textarea
              id="echoInput"
              rows="4"
              aria-describedby="echo-help"
              placeholder='{"hello":"world"}'
            ></textarea>
          </label>
          <p id="echo-help" class="visually-hidden">
            Enter a JSON payload to send to the echo API.
          </p>
          <button type="submit" aria-controls="echoOut">POST /api/echo</button>
        </form>
        <pre
          id="echoOut"
          role="status"
          aria-live="polite"
        >(submit to send)</pre>
      </section>
    </main>

    <script type="module" defer src="/assets/app.js"></script>
  </body>
</html>
