<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>os.ubq.fi — Minimal Deno Server</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main>
      <h1>os.ubq.fi</h1>
      <p>Minimal Deno server with a simple UI and API.</p>

      <section>
        <h2>Health</h2>
        <button id="checkHealth">Check Health</button>
        <pre id="healthOut">(click to load)</pre>
      </section>

      <section>
        <h2>Time</h2>
        <button id="getTime">Get Time</button>
        <pre id="timeOut">(click to load)</pre>
      </section>

      <section>
        <h2>Issues</h2>
        <div class="table-shell">
          <table aria-label="Issues">
            <thead>
              <tr>
                <th>
                  <button type="button" class="sort-header" data-sort="id">ID <span aria-hidden="true"></span></button>
                </th>
                <th>
                  <button type="button" class="sort-header" data-sort="title">
                    Title <span aria-hidden="true"></span>
                  </button>
                </th>
                <th>
                  <button type="button" class="sort-header" data-sort="status">
                    Status <span aria-hidden="true"></span>
                  </button>
                </th>
                <th>
                  <button type="button" class="sort-header" data-sort="created">
                    Created <span aria-hidden="true"></span>
                  </button>
                </th>
              </tr>
            </thead>
            <tbody id="issueRows">
              <tr>
                <td colspan="4">Loading rows...</td>
              </tr>
            </tbody>
          </table>
        </div>
        <aside class="issue-inspector" aria-live="polite">
          <h3>Selected issue</h3>
          <dl id="issueInspector">
            <div>
              <dt>Status</dt>
              <dd>Select a row or open a URL with <code>rowId</code>.</dd>
            </div>
          </dl>
        </aside>
      </section>

      <section>
        <h2>Echo</h2>
        <form id="echoForm">
          <label>
            JSON payload
            <textarea id="echoInput" rows="4" placeholder='{"hello":"world"}'></textarea>
          </label>
          <button type="submit">POST /api/echo</button>
        </form>
        <pre id="echoOut">(submit to send)</pre>
      </section>
    </main>

    <script type="module" defer src="/assets/app.js"></script>
  </body>
  </html>
